<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- Heights 1, 3, 4, 2 (a permutation of 1..4) -->
  <!-- B1 (h=1) -->
  <g>
    <rect x="8" y="46" width="11" height="10" fill="#fbbf24"/>
    <g fill="#0f172a">
      <rect x="11" y="51" width="2" height="2"/>
      <rect x="15" y="51" width="2" height="2"/>
    </g>
  </g>
  <!-- B2 (h=3) -->
  <g>
    <rect x="21" y="26" width="11" height="30" fill="#fb923c"/>
    <g fill="#0f172a">
      <rect x="24" y="31" width="2" height="2"/>
      <rect x="28" y="31" width="2" height="2"/>
      <rect x="24" y="41" width="2" height="2"/>
      <rect x="28" y="41" width="2" height="2"/>
      <rect x="24" y="51" width="2" height="2"/>
      <rect x="28" y="51" width="2" height="2"/>
    </g>
  </g>
  <!-- B3 (tallest, h=4, with antenna) -->
  <g>
    <rect x="34" y="16" width="11" height="40" fill="#22d3ee"/>
    <rect x="39" y="10" width="1" height="6" fill="#22d3ee"/>
    <g fill="#0f172a">
      <rect x="37" y="21" width="2" height="2"/>
      <rect x="41" y="21" width="2" height="2"/>
      <rect x="37" y="31" width="2" height="2"/>
      <rect x="41" y="31" width="2" height="2"/>
      <rect x="37" y="41" width="2" height="2"/>
      <rect x="41" y="41" width="2" height="2"/>
      <rect x="37" y="51" width="2" height="2"/>
      <rect x="41" y="51" width="2" height="2"/>
    </g>
  </g>
  <!-- B4 (h=2) -->
  <g>
    <rect x="47" y="36" width="11" height="20" fill="#38bdf8"/>
    <g fill="#0f172a">
      <rect x="50" y="41" width="2" height="2"/>
      <rect x="54" y="41" width="2" height="2"/>
      <rect x="50" y="51" width="2" height="2"/>
      <rect x="54" y="51" width="2" height="2"/>
    </g>
  </g>
</svg>
