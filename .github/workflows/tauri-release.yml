name: Tauri release

# Triggered by the `skyscrapers-tauri/vX.Y.Z` tag that tagpr creates
# (see .tagpr at the repo root) when its release PR is merged.
# `workflow_dispatch` lets the user re-run a release from the Actions UI
# (e.g. after rotating Apple signing secrets).
on:
  push:
    tags: ["skyscrapers-tauri/v*"]
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One macOS job builds a universal (arm64 + x86_64) binary so a
          # single download runs on both Apple Silicon and Intel Macs.
          - platform: macos-latest
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust_target: ""
            tauri_args: ""
          - platform: windows-latest
            rust_target: ""
            tauri_args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.1
        with:
          workspaces: skyscrapers-tauri/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: |
            skyscrapers-player/package-lock.json
            skyscrapers-tauri/package-lock.json

      - name: Install player dependencies
        working-directory: skyscrapers-player
        run: npm ci

      - name: Install Tauri frontend dependencies
        working-directory: skyscrapers-tauri
        run: npm ci

      # macOS code signing is opt-in. The Tauri bundler treats the mere
      # presence of $APPLE_CERTIFICATE — even when empty — as "sign this",
      # then fails trying to import an empty certificate. So we only
      # promote the APPLE_* secrets to the job environment (via
      # $GITHUB_ENV) when the certificate is actually configured;
      # otherwise they stay unset and the bundle is built unsigned, like
      # the Windows/Linux artifacts. Scoping the secrets to this step's
      # own env block means empty values never leak into the build step.
      - name: Configure macOS code signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret is not set — the macOS bundle will be built UNSIGNED."
            exit 0
          fi
          # APPLE_CERTIFICATE is base64 and may be multi-line, so use the
          # heredoc form of $GITHUB_ENV; the rest are single-line tokens.
          {
            echo "APPLE_CERTIFICATE<<__APPLE_CERT_EOF__"
            echo "$APPLE_CERTIFICATE"
            echo "__APPLE_CERT_EOF__"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"
          echo "macOS signing secrets detected — the bundle will be signed and notarised."

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: skyscrapers-tauri
          tagName: skyscrapers-tauri/v__VERSION__
          releaseName: "Skyscrapers Tauri v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
