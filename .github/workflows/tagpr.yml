name: tagpr

# Watches main; on every merge that touches a crate or package included
# in the Tauri bundle, tagpr opens or updates a "[skyscrapers-tauri]
# Release for X.Y.Z" PR that bumps the three Tauri version files in
# lockstep (see .tagpr). Merging that PR creates the
# `skyscrapers-tauri/vX.Y.Z` tag, which in turn triggers
# `.github/workflows/tauri-release.yml`.
#
# That trigger only fires if the tag is pushed with a PAT / GitHub App
# token: tags pushed with the default GITHUB_TOKEN do NOT start other
# workflows. We therefore use TAGPR_GITHUB_TOKEN when available (a
# fine-grained PAT with contents:write + pull-requests:write), falling
# back to GITHUB_TOKEN so the release PR still opens — in that fallback
# the tag won't auto-build and the release must be started manually via
# tauri-release.yml's workflow_dispatch.
on:
  push:
    branches: ["main"]
    paths:
      - "skyscrapers-tauri/**"
      - "skyscrapers-core/**"
      - "skyscrapers-generator/**"
      - "skyscrapers-solver/**"
      - "skyscrapers-player/**"
      # Workspace manifest changes (shared dependency versions, profiles)
      # can alter the Tauri bundle, so they should drive a release PR too.
      # Cargo.lock is intentionally NOT listed: nearly every workspace
      # change touches it, which would churn the release PR for updates
      # unrelated to the Tauri app.
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Persisted as the git credential for tagpr's `git push --tags`;
          # using the PAT here is what lets the new tag trigger the release.
          token: ${{ secrets.TAGPR_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      # Needed so the `.tagpr` command can refresh skyscrapers-tauri's
      # package-lock.json version alongside the Cargo lockfile. (cargo is
      # already present on the ubuntu-latest runner image.)
      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
      - name: Run tagpr
        uses: Songmu/tagpr@555e72cee68c09d43dc2337dc9ba890955b630da # v1.19.0
        env:
          GITHUB_TOKEN: ${{ secrets.TAGPR_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
