name: Web

on:
  push:
    branches: ["main"]
    paths:
      - "skyscrapers-web/**"
      - "skyscrapers-generator/**"
      - "skyscrapers-core/**"
      - "skyscrapers-solver/**"
  pull_request:
    branches: ["main"]
    paths:
      - "skyscrapers-web/**"
      - "skyscrapers-generator/**"
      - "skyscrapers-core/**"
      - "skyscrapers-solver/**"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skyscrapers-web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: wasm-pack build --target web ../skyscrapers-generator
      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: skyscrapers-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
