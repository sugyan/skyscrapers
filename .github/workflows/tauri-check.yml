name: Tauri check

on:
  pull_request:
    branches: ["main"]
    paths:
      - "skyscrapers-tauri/**"
      - "skyscrapers-core/**"
      - "skyscrapers-generator/**"
      - "skyscrapers-solver/**"
      - "skyscrapers-player/**"
      - ".github/workflows/tauri-check.yml"

# A new push to the same PR cancels the in-flight matrix; we only care
# about the latest commit.
concurrency:
  group: tauri-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.1
        with:
          workspaces: skyscrapers-tauri/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: |
            skyscrapers-player/package-lock.json
            skyscrapers-tauri/package-lock.json

      - name: Install player dependencies
        working-directory: skyscrapers-player
        run: npm ci

      - name: Install Tauri frontend dependencies
        working-directory: skyscrapers-tauri
        run: npm ci

      # `--no-bundle` skips the heavy DMG / MSI / AppImage assembly while
      # still exercising the full Rust + frontend build, which is what
      # we want for a PR smoke check.
      - name: Build (no bundle)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: skyscrapers-tauri
          args: --no-bundle
